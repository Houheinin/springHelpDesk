<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/tickets}">
            <img th:src="@{/images/logo2.png}" alt="Logo" height="30" class="d-inline-block align-text-top me-2">
            Help Desk Admin
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">FAQ</a>
            <a class="nav-link" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link"
                        style="background: none !important; border: none; padding: 0.5rem 1rem; cursor: pointer;">
                    Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="mb-1">Список заявок</h1>
            <p class="text-muted mb-0">Закрытая зона администратора</p>
        </div>
        <span class="badge text-bg-primary fs-6"
              th:text="${#lists.size(tickets)} + ' заявок'">
            0 заявок
        </span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Тема</th>
                        <th>Описание</th>
                        <th>Статус</th>
                        <th>Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td th:text="${ticket.id}">1</td>
                        <td th:text="${ticket.customerName}">Иван</td>
                        <td th:text="${ticket.title}">Не работает ПК</td>
                        <td th:text="${ticket.description}">Описание</td>
                        <td>
                            <span class="badge text-bg-info"
                                  th:text="${ticket.status}">NEW</span>
                        </td>
                        <td th:text="${#temporals.format(ticket.createdAt,
                                'dd.MM.yyyy HH:mm')}">
                            01.01.2026 10:00
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

</body>
</html>
