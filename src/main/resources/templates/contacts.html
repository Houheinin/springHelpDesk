<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Контакты поддержки</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <img th:src="@{/images/logo2.png}" alt="Logo" height="30" class="d-inline-block align-text-top me-2">
            Help Desk
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link active" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">faq</a>
            <a class="nav-link" href="/tickets">Заявки</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">
        Контакты поддержки
    </h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped align-middle mb-0">
                <thead>
                <tr>
                    <th>Канал связи</th>
                    <th>Контактные данные</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="channel : ${SupportCh}">
                    <td th:text="${channel.channel}">Телефон</td>
                    <td th:text="${channel.value}">+7 (000) 000-00-00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <h5 class="card-title fw-bold mb-3">Что указать в обращении</h5>
            <ul class="mb-0">
                <li th:each="item : ${obrashenie}" th:text="${item}">Пункт списка</li>
            </ul>
        </div>
    </div>


    <a class="btn btn-outline-primary mt-4" th:href="@{/}">
        Вернуться на главную
    </a>
</main>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
