<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">FAQ</title>
    <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <img th:src="@{/images/logo2.png}" alt="Logo" height="30" class="d-inline-block align-text-top me-2">
            Help Desk
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link active" th:href="@{/faq}">FAQ</a>
            <a class="nav-link" href="/tickets">Заявки</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
            <a class="nav-link" th:href="@{/admin/tickets}">Админ-панель</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">
        Часто задаваемые вопросы
    </h1>

    <div class="row g-4">
        <div class="col-md-6" th:each="item : ${faqList}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${item.question}">Вопрос</h5>
                    <p class="card-text" th:text="${item.answer}">Ответ</p>
                </div>
            </div>
        </div>
    </div>


    <a class="btn btn-outline-primary mt-4" th:href="@{/}">
        Вернуться на главную
    </a>

</main>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
